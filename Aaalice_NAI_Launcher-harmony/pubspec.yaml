name: nai_launcher
description: NovelAI Universal Launcher - 跨平台第三方客户端
publish_to: "none"
version: 1.0.0-beta9+12

environment:
  sdk: ">=3.2.0 <4.0.0"
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  # 1. 挂载本地的鸿蒙版 file_picker (注意路径末尾要加上 /ohos)
  file_picker_ohos:
    path: E:/AI/NAI_Harmony/flutter_sqflite/fluttertpc_file_picker/ohos

  # 2. 挂载本地的华为分享插件
  share_plus:
    path: E:/AI/NAI_Harmony/flutter_sqflite/flutter_plus_plugins/packages/share_plus/share_plus


  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  dio: ^5.4.0
  dio_http2_adapter: ^2.3.0
  flutter_cache_manager: ^3.3.0
  
  flutter_secure_storage: ^9.2.4
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  sqflite: ^2.3.0
  sqlite3_flutter_libs: ^0.5.28

  cryptography: ^2.7.0
  crypto: ^3.0.3
  archive: ^3.6.1
  msgpack_dart: ^1.0.1
  image: ^4.1.7
  
  super_clipboard: ^0.8.23
  super_drag_and_drop: ^0.8.23
  
  go_router: ^14.2.0
  flex_color_scheme: ^7.3.1
  google_fonts: ^6.2.1
  emoji_picker_flutter: ^2.1.1
  fl_chart: ^0.68.0
  visibility_detector: ^0.4.0+2
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0
  path_provider: ^2.1.3
  path: ^1.9.0
  uuid: ^4.4.0
  intl: ^0.19.0
  collection: ^1.18.0
  synchronized: ^3.1.0
  csv: ^6.0.0
  logger: ^2.4.0
  audioplayers: ^6.0.0

  video_player: ^2.8.0
  video_player_media_kit: ^1.0.5

  cached_network_image: ^3.4.1
  url_launcher: ^6.3.1
  flutter_staggered_grid_view: ^0.7.0
  permission_handler: ^11.3.1
  device_info_plus: ^10.1.0
  timeago: ^3.7.1
  package_info_plus: ^8.0.0
  png_chunks_extract: any
  pub_semver: ^2.1.4
  
  image_gallery_saver_plus: ^4.0.1

  dart_sentencepiece_tokenizer: 
    path: E:/AI/NAI_Harmony/flutter_sqflite/dart_sentencepiece_tokenizer
    
  web_socket_channel: ^3.0.3  
  onnxruntime: ^1.4.1                  
  open_filex: ^4.7.0
  shared_preferences: ^2.2.0

dev_dependencies:
  flutter:
    sdk: flutter
 # sqflite_common_ffi: ^2.3.3   👈 加上 # 注释掉！ 
  flutter_launcher_icons: ^0.13.1
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  hive_generator: ^2.0.1
  path_provider_platform_interface: any
  plugin_platform_interface: any
# sqlite3: ^2.9.4              👈 加上 # 注释掉！

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/translations/
    - assets/data/
    - assets/data/wordlists/
    - assets/data/tokenizers/
    - assets/sounds/
    - assets/databases/
    - assets/database/
  fonts:
    - family: LXGW ZhenKai GB
      fonts:
        - asset: fonts/LXGWZhenKaiGB-Regular.ttf

flutter_icons:
  android: true
  ios: false
  image_path: "assets/app_icon.png"

# 👇 这里是强行镇压版本冲突，并替换鸿蒙版数据库的核武器！
# 👇 终极本地相对路径方案，彻底解决跨盘符报错！
dependency_overrides:
  google_fonts: ^6.2.1
  sqflite:
    path: ../flutter_sqflite/sqflite          # 👈 加了一个点，变成 ../
  sqflite_common:
    path: ../flutter_sqflite/sqflite_common   # 👈 加了一个点，变成 ../
# 强制霸王条款：解决依赖冲突
  path_provider: any
  path_provider_platform_interface: any
  
  # 2. 关联本地的 share_plus 接口包
  # 注意：通常它和 share_plus 是平级的，都在 packages 目录下
  share_plus_platform_interface:
    path: E:/AI/NAI_Harmony/flutter_sqflite/flutter_plus_plugins/packages/share_plus/share_plus_platform_interface

  win32: ^5.0.0